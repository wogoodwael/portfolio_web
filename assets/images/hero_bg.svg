<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow1" cx="75%" cy="18%" r="45%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#080C14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="18%" cy="82%" r="40%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#080C14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0D1421" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080C14" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="glow4" cx="90%" cy="90%" r="35%">
      <stop offset="0%" stop-color="#06D6A0" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#080C14" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base fill -->
  <rect width="1400" height="900" fill="#080C14"/>
  <rect width="1400" height="900" fill="url(#glow3)"/>
  <rect width="1400" height="900" fill="url(#glow1)"/>
  <rect width="1400" height="900" fill="url(#glow2)"/>
  <rect width="1400" height="900" fill="url(#glow4)"/>

  <!-- Perspective grid – horizontal lines converging toward center bottom -->
  <g stroke="#1E2D42" stroke-width="0.7" opacity="0.65">
    <line x1="0" y1="540" x2="1400" y2="540"/>
    <line x1="0" y1="610" x2="1400" y2="610"/>
    <line x1="0" y1="668" x2="1400" y2="668"/>
    <line x1="0" y1="716" x2="1400" y2="716"/>
    <line x1="0" y1="756" x2="1400" y2="756"/>
    <line x1="0" y1="790" x2="1400" y2="790"/>
    <line x1="0" y1="820" x2="1400" y2="820"/>
    <line x1="0" y1="846" x2="1400" y2="846"/>
    <line x1="0" y1="868" x2="1400" y2="868"/>
    <line x1="0" y1="887" x2="1400" y2="887"/>
  </g>

  <!-- Perspective grid – vertical vanishing lines to center horizon -->
  <g stroke="#1E2D42" stroke-width="0.7" opacity="0.55">
    <line x1="700" y1="460" x2="1400" y2="900"/>
    <line x1="700" y1="460" x2="0"    y2="900"/>
    <line x1="700" y1="460" x2="1200" y2="900"/>
    <line x1="700" y1="460" x2="200"  y2="900"/>
    <line x1="700" y1="460" x2="1050" y2="900"/>
    <line x1="700" y1="460" x2="350"  y2="900"/>
    <line x1="700" y1="460" x2="950"  y2="900"/>
    <line x1="700" y1="460" x2="450"  y2="900"/>
    <line x1="700" y1="460" x2="860"  y2="900"/>
    <line x1="700" y1="460" x2="540"  y2="900"/>
    <line x1="700" y1="460" x2="800"  y2="900"/>
    <line x1="700" y1="460" x2="600"  y2="900"/>
    <line x1="700" y1="460" x2="760"  y2="900"/>
    <line x1="700" y1="460" x2="640"  y2="900"/>
  </g>

  <!-- Horizon glow line -->
  <line x1="0" y1="540" x2="1400" y2="540" stroke="#00D4FF" stroke-width="1" opacity="0.35"/>

  <!-- Floating Dart / Flutter code keywords -->
  <g font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#00D4FF" opacity="0.13">
    <text x="80"  y="110">class</text>
    <text x="260" y="60">{}</text>
    <text x="520" y="130">() =></text>
    <text x="820" y="75">Widget</text>
    <text x="1100" y="120">BuildContext</text>
    <text x="1260" y="55">async</text>
    <text x="140" y="380">StatefulWidget</text>
    <text x="650" y="320">StreamBuilder</text>
    <text x="1050" y="280">setState()</text>
    <text x="900" y="400">Scaffold</text>
    <text x="300" y="470">MaterialApp</text>
    <text x="1180" y="420">Column</text>
  </g>
  <g font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#7C3AED" opacity="0.18">
    <text x="190" y="180">GetX</text>
    <text x="700" y="180">Bloc</text>
    <text x="980" y="160">Provider</text>
    <text x="1300" y="220">Riverpod</text>
    <text x="60"  y="290">Navigator</text>
    <text x="420" y="250">dio</text>
    <text x="1150" y="340">Firestore</text>
    <text x="480" y="400">SQLite</text>
    <text x="780" y="440">Stripe</text>
    <text x="1050" y="470">PayPal</text>
    <text x="200" y="490">MyFatoorah</text>
    <text x="590" y="490">REST</text>
  </g>
  <g font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#06D6A0" opacity="0.12">
    <text x="360" y="140">import</text>
    <text x="870" y="230">final</text>
    <text x="1200" y="310">const</text>
    <text x="100" y="440">return</text>
    <text x="680" y="390">override</text>
  </g>

  <!-- Glowing dot particles -->
  <g>
    <!-- Cyan dots -->
    <circle cx="160"  cy="90"  r="2"   fill="#00D4FF" opacity="0.8"/>
    <circle cx="160"  cy="90"  r="8"   fill="#00D4FF" opacity="0.08"/>
    <circle cx="1200" cy="130" r="2"   fill="#00D4FF" opacity="0.7"/>
    <circle cx="1200" cy="130" r="8"   fill="#00D4FF" opacity="0.07"/>
    <circle cx="700"  cy="50"  r="1.5" fill="#00D4FF" opacity="0.6"/>
    <circle cx="700"  cy="50"  r="6"   fill="#00D4FF" opacity="0.07"/>
    <circle cx="430"  cy="310" r="2"   fill="#00D4FF" opacity="0.5"/>
    <circle cx="1050" cy="350" r="1.5" fill="#00D4FF" opacity="0.5"/>
    <circle cx="300"  cy="510" r="2"   fill="#00D4FF" opacity="0.4"/>
    <circle cx="1100" cy="510" r="2"   fill="#00D4FF" opacity="0.4"/>

    <!-- Violet dots -->
    <circle cx="300"  cy="200" r="2"   fill="#7C3AED" opacity="0.8"/>
    <circle cx="300"  cy="200" r="7"   fill="#7C3AED" opacity="0.10"/>
    <circle cx="1100" cy="240" r="2"   fill="#7C3AED" opacity="0.7"/>
    <circle cx="1100" cy="240" r="7"   fill="#7C3AED" opacity="0.09"/>
    <circle cx="600"  cy="440" r="1.5" fill="#7C3AED" opacity="0.5"/>
    <circle cx="850"  cy="420" r="1.5" fill="#7C3AED" opacity="0.5"/>

    <!-- Green dots -->
    <circle cx="1300" cy="100" r="1.5" fill="#06D6A0" opacity="0.7"/>
    <circle cx="1300" cy="100" r="6"   fill="#06D6A0" opacity="0.09"/>
    <circle cx="90"   cy="340" r="1.5" fill="#06D6A0" opacity="0.6"/>
    <circle cx="90"   cy="340" r="5"   fill="#06D6A0" opacity="0.08"/>
    <circle cx="750"  cy="280" r="1.2" fill="#06D6A0" opacity="0.5"/>
  </g>

  <!-- Circuit-like connector paths -->
  <g stroke="#1E2D42" stroke-width="1" fill="none" opacity="0.7">
    <path d="M100 140 L100 165 L140 165"/>
    <circle cx="140" cy="165" r="2.5" fill="#00D4FF" opacity="0.55" stroke="none"/>

    <path d="M1280 170 L1280 195 L1250 195"/>
    <circle cx="1250" cy="195" r="2.5" fill="#7C3AED" opacity="0.55" stroke="none"/>

    <path d="M430 82 L458 82 L458 108"/>
    <circle cx="458" cy="108" r="2.5" fill="#06D6A0" opacity="0.55" stroke="none"/>

    <path d="M950 90 L920 90 L920 115"/>
    <circle cx="920" cy="115" r="2.5" fill="#00D4FF" opacity="0.5" stroke="none"/>

    <path d="M200 390 L200 415 L230 415"/>
    <circle cx="230" cy="415" r="2.5" fill="#7C3AED" opacity="0.5" stroke="none"/>

    <path d="M1180 390 L1180 415 L1150 415"/>
    <circle cx="1150" cy="415" r="2.5" fill="#00D4FF" opacity="0.5" stroke="none"/>
  </g>

  <!-- Flutter "F" logo large watermark bottom-right -->
  <g transform="translate(1220, 640)" opacity="0.04">
    <rect x="0"  y="0"  width="120" height="18" rx="4" fill="#00D4FF"/>
    <rect x="0"  y="34" width="90"  height="18" rx="4" fill="#00D4FF"/>
    <g transform="translate(14, 62) rotate(-45)">
      <rect x="0" y="0"  width="18" height="70"  rx="4" fill="#00D4FF"/>
      <rect x="0" y="52" width="70" height="18" rx="4" fill="#7C3AED"/>
    </g>
  </g>

  <!-- Top accent lines -->
  <line x1="0"    y1="2" x2="1400" y2="2" stroke="#00D4FF" stroke-width="2"   opacity="0.22"/>
  <line x1="0"    y1="6" x2="560"  y2="6" stroke="#7C3AED" stroke-width="0.8" opacity="0.28"/>
  <line x1="840"  y1="6" x2="1400" y2="6" stroke="#00D4FF" stroke-width="0.8" opacity="0.20"/>

  <!-- Left vertical accent -->
  <line x1="52" y1="0" x2="52" y2="900" stroke="#1E2D42" stroke-width="1" opacity="0.5"/>
</svg>
